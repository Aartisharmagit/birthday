<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Birthday Surprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff758f;
            --accent: #ffb3c1;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #0f172a;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .main-container {
            text-align: center;
            z-index: 20;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-surprise {
            background: linear-gradient(45deg, #ff4d6d, #c9184a);
            color: white;
            padding: 1.5rem 3rem;
            font-size: 1.5rem;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.4);
            cursor: pointer;
            border: none;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-surprise:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.6);
        }

        /* Cake Animation Classes */
        .cake-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 2rem auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .cake-layer {
            opacity: 0;
            transform: translateY(100px);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 50% / 20%;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2);
        }

        .layer-1 { width: 200px; height: 60px; background: #ff4d6d; z-index: 3; }
        .layer-2 { width: 160px; height: 50px; background: #ff758f; z-index: 4; margin-bottom: -15px; }
        .layer-3 { width: 120px; height: 40px; background: #ffb3c1; z-index: 5; margin-bottom: -15px; }

        .candle {
            opacity: 0;
            transform: scale(0);
            width: 12px;
            height: 40px;
            background: linear-gradient(#eee, #ff4d6d);
            border-radius: 3px;
            position: relative;
            z-index: 6;
            margin-bottom: -10px;
            transition: all 0.5s ease-out;
        }

        .flame {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 25px;
            background: orange;
            border-radius: 50% 50% 20% 20%;
            animation: flicker 0.1s infinite alternate;
            box-shadow: 0 0 20px orange;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.1); }
        }

        .wish-text {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            background: linear-gradient(to right, #ff4d6d, #ffb3c1, #ff4d6d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
            opacity: 0;
            transform: scale(0.5);
            transition: all 1s ease-out;
        }

        /* Show States */
        .layer-visible { opacity: 1; transform: translateY(0); }
        .wish-visible { opacity: 1; transform: scale(1); animation: float 3s ease-in-out infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 100px;
            height: 125px;
            border-radius: 50%;
            z-index: 5;
            transition: transform 0.5s;
        }

        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            animation: sparkle-anim 1s linear forwards;
        }

        @keyframes sparkle-anim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1) rotate(180deg); opacity: 0; }
        }

        .bg-gradient-animate {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-gradient-animate">

    <canvas id="canvas"></canvas>

    <div class="main-container" id="initial-screen">
        <button class="btn-surprise" onclick="revealSurprise()">
            Unlock Surprise! ✨
        </button>
    </div>

    <div class="main-container" id="surprise-screen" style="display:none;">
        <div class="cake-container">
            <div id="candle" class="candle"><div class="flame"></div></div>
            <div id="layer3" class="cake-layer layer-3"></div>
            <div id="layer2" class="cake-layer layer-2"></div>
            <div id="layer1" class="cake-layer layer-1"></div>
        </div>

        <div id="wish" class="wish-text">Happy Birthday My Love!</div>
        
        <p id="sub-text" class="text-white text-xl opacity-0 transition-opacity duration-1000 max-w-md mx-auto leading-relaxed">
           Wishing you a very happy birthday Sinnu babu  ✨🩵
            I truly wish you endless happiness, good health, and a bright future.
            May all your dreams come true — always stay blessed. 💗
        </p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationFrame;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Confetti {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 8 + 4;
                this.speed = Math.random() * 3 + 2;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 5 - 2.5;
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
            }
            update() {
                this.y += this.speed;
                this.angle += this.spin;
                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function createBalloons() {
            const colors = ['#ff4d6d', '#ff758f', '#ffb3c1', '#7209b7', '#4361ee', '#4cc9f0'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = 'balloon';
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    b.style.backgroundColor = color;
                    b.style.boxShadow = `inset -10px -10px 20px rgba(0,0,0,0.2), 0 10px 20px ${color}44`;
                    b.style.left = Math.random() * 90 + 'vw';
                    const duration = Math.random() * 4 + 6;
                    b.style.transition = `transform ${duration}s linear`;
                    document.body.appendChild(b);
                    b.offsetHeight;
                    b.style.transform = `translateY(-${window.innerHeight + 300}px) rotate(${Math.random() * 40 - 20}deg)`;
                    setTimeout(() => b.remove(), duration * 1000);
                }, i * 400);
            }
        }

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const size = Math.random() * 15 + 10;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = x - size/2 + 'px';
            sparkle.style.top = y - size/2 + 'px';
            sparkle.innerHTML = `<svg viewBox="0 0 24 24" fill="gold"><path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z" /></svg>`;
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1000);
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            animationFrame = requestAnimationFrame(animate);
        }

        async function revealSurprise() {
            const initial = document.getElementById('initial-screen');
            initial.style.opacity = '0';
            
            setTimeout(async () => {
                initial.style.display = 'none';
                document.getElementById('surprise-screen').style.display = 'block';

                // 1. Cake Layer Animation (Bottom up)
                const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
                
                await wait(200);
                document.getElementById('layer1').classList.add('layer-visible');
                await wait(600);
                document.getElementById('layer2').classList.add('layer-visible');
                await wait(600);
                document.getElementById('layer3').classList.add('layer-visible');
                await wait(600);
                document.getElementById('candle').style.opacity = '1';
                document.getElementById('candle').style.transform = 'scale(1) translateX(-50%)';
                
                // 2. Wish Text Animation
                await wait(800);
                document.getElementById('wish').classList.add('wish-visible');
                document.getElementById('sub-text').style.opacity = '1';

                // 3. Effects Start
                for (let i = 0; i < 120; i++) {
                    particles.push(new Confetti());
                }
                animate();
                createBalloons();
                
                setInterval(() => {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    createSparkle(x, y);
                }, 250);

                window.addEventListener('mousemove', (e) => {
                    if(Math.random() > 0.8) createSparkle(e.clientX, e.clientY);
                });
            }, 500);
        }
    </script>
</body>
</html>
