<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Birthday Surprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff758f;
            --accent: #ffb3c1;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #070b14; /* Slightly darker for better light contrast */
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        /* Twinkling Background Lights */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 10px white; }
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .main-container {
            text-align: center;
            z-index: 20;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-surprise {
            background: linear-gradient(45deg, #ff4d6d, #c9184a);
            color: white;
            padding: 1.25rem 2.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.4);
            cursor: pointer;
            border: none;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: pulse 2s infinite;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Responsive Cake Container */
        .cake-container {
            position: relative;
            width: 180px;
            height: 150px;
            margin: 0 auto 1.5rem auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        @media (min-width: 640px) {
            .cake-container { width: 250px; height: 220px; }
        }

        .cake-layer {
            opacity: 0;
            transform: translateY(100px);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 50% / 20%;
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.3);
        }

        .layer-1 { width: 150px; height: 45px; background: #ff4d6d; z-index: 3; }
        .layer-2 { width: 120px; height: 40px; background: #ff758f; z-index: 4; margin-bottom: -12px; }
        .layer-3 { width: 90px; height: 35px; background: #ffb3c1; z-index: 5; margin-bottom: -12px; }

        @media (min-width: 640px) {
            .layer-1 { width: 200px; height: 60px; }
            .layer-2 { width: 160px; height: 50px; margin-bottom: -15px; }
            .layer-3 { width: 120px; height: 40px; margin-bottom: -15px; }
        }

        .candle {
            opacity: 0;
            transform: scale(0);
            width: 8px;
            height: 30px;
            background: linear-gradient(#fff, #ff4d6d);
            border-radius: 3px;
            position: relative;
            z-index: 6;
            margin-bottom: -8px;
            transition: all 0.5s ease-out;
        }

        .flame {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 20px;
            background: radial-gradient(#fff, #ffa500, #ff4500);
            border-radius: 50% 50% 20% 20%;
            animation: flicker 0.1s infinite alternate;
            box-shadow: 0 0 15px #ffa500;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.15); }
        }

        .wish-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.75rem;
            background: linear-gradient(to right, #fff, #ffb3c1, #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 5px 20px rgba(255, 77, 109, 0.5);
            opacity: 0;
            transform: scale(0.5);
            transition: all 1s ease-out;
            margin-bottom: 1.5rem;
            padding: 0 10px;
            line-height: 1.3;
        }

        @media (min-width: 640px) {
            .wish-text { font-size: 3rem; }
        }

        /* Show States */
        .layer-visible { opacity: 1; transform: translateY(0); }
        .wish-visible { opacity: 1; transform: scale(1); animation: float 3s ease-in-out infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Final Message Styling - Pure White & Mobile Friendly */
        .final-message {
            color: #ffffff !important;
            font-size: 0.95rem;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease-out;
            margin-top: 1rem;
            font-weight: 500;
            padding: 0 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        @media (min-width: 640px) {
            .final-message { font-size: 1.15rem; }
        }

        .visible { opacity: 1; transform: translateY(0); }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 60px;
            height: 80px;
            border-radius: 50%;
            z-index: 5;
        }

        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            animation: sparkle-anim 1s linear forwards;
        }

        @keyframes sparkle-anim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.2) rotate(180deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>
    <canvas id="canvas"></canvas>

    <div class="main-container" id="initial-screen">
        <button class="btn-surprise" onclick="revealSurprise()">
            Unlock Surprise! ✨
        </button>
    </div>

    <div class="main-container" id="surprise-screen" style="display:none;">
        <div class="cake-container">
            <div id="candle" class="candle"><div class="flame"></div></div>
            <div id="layer3" class="cake-layer layer-3"></div>
            <div id="layer2" class="cake-layer layer-2"></div>
            <div id="layer1" class="cake-layer layer-1"></div>
        </div>

        <div id="wish" class="wish-text">wishing you a very happy birthday Sinnu babu ✨🩵</div>
        
        <div id="sub-text" class="final-message">
            Wishing you a very happy birthday Sinnu babu ✨🩵<br>
            I truly wish you endless happiness, good health, and a bright future.<br>
            May all your dreams come true — always stay blessed. 💗
        </div>
    </div>

    <script>
        // Create Background Stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.animationDelay = Math.random() * 5 + 's';
            starsContainer.appendChild(star);
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationFrame;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Confetti {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 5 + 3;
                this.speed = Math.random() * 2 + 1.5;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 4 - 2;
                this.color = `hsl(${Math.random() * 360}, 80%, 65%)`;
            }
            update() {
                this.y += this.speed;
                this.angle += this.spin;
                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function createBalloons() {
            const colors = ['#ff4d6d', '#ff758f', '#ffb3c1', '#7209b7', '#4361ee', '#4cc9f0'];
            const count = window.innerWidth < 640 ? 8 : 15;
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = 'balloon';
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    b.style.backgroundColor = color;
                    b.style.boxShadow = `inset -8px -8px 15px rgba(0,0,0,0.2), 0 8px 15px ${color}44`;
                    b.style.left = Math.random() * 80 + 10 + 'vw';
                    const duration = Math.random() * 5 + 7;
                    b.style.transition = `transform ${duration}s linear`;
                    document.body.appendChild(b);
                    b.offsetHeight;
                    b.style.transform = `translateY(-${window.innerHeight + 400}px) rotate(${Math.random() * 30 - 15}deg)`;
                    setTimeout(() => b.remove(), duration * 1000);
                }, i * 600);
            }
        }

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const size = Math.random() * 10 + 10;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = x - size/2 + 'px';
            sparkle.style.top = y - size/2 + 'px';
            sparkle.innerHTML = `<svg viewBox="0 0 24 24" fill="gold"><path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z" /></svg>`;
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1000);
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            animationFrame = requestAnimationFrame(animate);
        }

        async function revealSurprise() {
            const initial = document.getElementById('initial-screen');
            initial.style.opacity = '0';
            
            setTimeout(async () => {
                initial.style.display = 'none';
                document.getElementById('surprise-screen').style.display = 'block';

                const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
                
                await wait(200);
                document.getElementById('layer1').classList.add('layer-visible');
                await wait(600);
                document.getElementById('layer2').classList.add('layer-visible');
                await wait(600);
                document.getElementById('layer3').classList.add('layer-visible');
                await wait(600);
                document.getElementById('candle').style.opacity = '1';
                document.getElementById('candle').style.transform = 'scale(1) translateX(-50%)';
                
                await wait(800);
                document.getElementById('wish').classList.add('wish-visible');
                await wait(500);
                document.getElementById('sub-text').classList.add('visible');

                const pCount = window.innerWidth < 640 ? 60 : 120;
                for (let i = 0; i < pCount; i++) {
                    particles.push(new Confetti());
                }
                animate();
                createBalloons();
                
                setInterval(() => {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    if(Math.random() > 0.5) createSparkle(x, y);
                }, 400);

                const handleInteraction = (e) => {
                    const x = e.touches ? e.touches[0].clientX : e.clientX;
                    const y = e.touches ? e.touches[0].clientY : e.clientY;
                    if(Math.random() > 0.8) createSparkle(x, y);
                };

                window.addEventListener('mousemove', handleInteraction);
                window.addEventListener('touchstart', handleInteraction);
                window.addEventListener('touchmove', handleInteraction);
            }, 500);
        }
    </script>
</body>
</html>
