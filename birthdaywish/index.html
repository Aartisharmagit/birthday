<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Birthday Surprise | Sinnu Babu</title>
    <!-- Google Fonts load kar rahe hain -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for colors */
        :root {
            --primary-pink: #ff4d6d;
            --light-pink: #ffb3c1;
            --dark-bg: #0f172a;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            overflow: hidden;
            background: var(--dark-bg);
            font-family: 'Poppins', sans-serif;
            height: 100%;
            width: 100%;
            color: var(--white);
        }

        /* Animated Background */
        .bg-gradient-animate {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Screen Containers */
        .screen-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        /* Typography */
        .wish-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ff4d6d, #ffb3c1, #ff4d6d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @media (min-width: 640px) {
            .wish-text { font-size: 3.5rem; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .message-text {
            font-weight: 300;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-top: 20px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .highlight {
            font-weight: 600;
            color: var(--light-pink);
            display: block;
            margin-top: 10px;
        }

        /* Buttons */
        .btn-surprise {
            background: linear-gradient(45deg, #ff4d6d, #c9184a);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-surprise:hover {
            transform: scale(1.05);
        }

        .btn-surprise:active {
            transform: scale(0.95);
        }

        /* 3D Cake CSS */
        .cake-container {
            position: relative;
            width: 180px;
            height: 140px;
            margin: 20px 0;
        }

        .cake-layer {
            position: absolute;
            width: 100%;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .layer-bottom {
            bottom: 0;
            height: 45%;
            background: linear-gradient(to bottom, #ff85a1, #ff4d6d);
            z-index: 2;
        }

        .layer-middle {
            bottom: 22%;
            width: 90%;
            left: 5%;
            height: 40%;
            background: linear-gradient(to bottom, #ffb3c1, #ff758f);
            z-index: 3;
        }

        .layer-top {
            bottom: 45%;
            width: 75%;
            left: 12.5%;
            height: 35%;
            background: linear-gradient(to bottom, #fff0f3, #ffb3c1);
            z-index: 4;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .candle {
            position: absolute;
            bottom: 65%;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 35px;
            background: linear-gradient(to right, #ffffff 50%, #ff4d6d 50%);
            background-size: 10px 10px;
            border-radius: 3px;
            z-index: 10;
        }

        .flame {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 20px;
            background: radial-gradient(circle at bottom, #ffed4a, #ff9d00, transparent);
            border-radius: 50% 50% 20% 20%;
            animation: flicker 0.1s infinite alternate;
            box-shadow: 0 0 15px #ff9d00;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.8; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 1; }
        }

        /* Balloon & Particles */
        .balloon {
            position: fixed;
            bottom: -100px;
            width: 40px;
            height: 55px;
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            width: 20px;
            height: 20px;
            animation: sparkle-fade 1s forwards;
        }

        @keyframes sparkle-fade {
            0% { transform: scale(0) rotate(0); opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }

        .gift-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="bg-gradient-animate">
        <canvas id="canvas"></canvas>

        <!-- Start Screen -->
        <div id="initial-screen" class="screen-container">
            <div class="gift-icon">🎁</div>
            <button onclick="revealSurprise()" class="btn-surprise">
                Tap for Magic ✨
            </button>
        </div>

        <!-- Surprise Screen -->
        <div id="surprise-screen" class="screen-container hidden">
            <h1 class="wish-text">
                Wishing you a very happy birthday Sinnu babu ✨🩵
            </h1>
            
            <div class="cake-container">
                <div class="cake-layer layer-bottom"></div>
                <div class="cake-layer layer-middle"></div>
                <div class="cake-layer layer-top"></div>
                <div class="candle">
                    <div class="flame"></div>
                </div>
            </div>

            <div class="message-text">
                 Wishing you a very happy birthday Sinnu babu  ✨🩵
            I truly wish you endless happiness, good health, and a bright future.
            May all your dreams come true.
                <span class="highlight">May all your dreams come true — always stay blessed. 💗</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationActive = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Confetti {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 7 + 4;
                this.speed = Math.random() * 3 + 2;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 10 - 5;
                this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.vx = Math.random() * 2 - 1;
            }
            update() {
                this.y += this.speed;
                this.x += this.vx;
                this.angle += this.spin;
                if (this.y > canvas.height) this.init();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function createBalloon() {
            const colors = ['#ff4d6d', '#ff758f', '#7209b7', '#4361ee', '#4cc9f0'];
            const b = document.createElement('div');
            b.className = 'balloon';
            const color = colors[Math.floor(Math.random() * colors.length)];
            b.style.backgroundColor = color;
            b.style.left = Math.random() * 90 + 'vw';
            b.style.boxShadow = `inset -5px -5px 15px rgba(0,0,0,0.3), 0 5px 15px ${color}66`;
            
            document.body.appendChild(b);
            
            const duration = Math.random() * 3 + 5;
            b.animate([
                { transform: 'translateY(0)' },
                { transform: `translateY(-${window.innerHeight + 200}px)` }
            ], {
                duration: duration * 1000,
                easing: 'linear'
            }).onfinish = () => b.remove();
        }

        function createSparkle(x, y) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = x + 'px';
            s.style.top = y + 'px';
            s.innerHTML = `<svg viewBox="0 0 24 24" fill="#FFD700"><path d="M12 0L14 8L24 12L14 16L12 24L10 16L0 12L10 8L12 0Z"/></svg>`;
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1000);
        }

        function animate() {
            if(!animationActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        function revealSurprise() {
            const initial = document.getElementById('initial-screen');
            const surprise = document.getElementById('surprise-screen');
            
            initial.style.opacity = '0';
            setTimeout(() => {
                initial.classList.add('hidden');
                surprise.classList.remove('hidden');
                
                animationActive = true;
                for (let i = 0; i < 100; i++) particles.push(new Confetti());
                animate();

                setInterval(createBalloon, 800);
                
                // Interaction
                const trigger = (e) => {
                    const x = e.touches ? e.touches[0].clientX : e.clientX;
                    const y = e.touches ? e.touches[0].clientY : e.clientY;
                    createSparkle(x, y);
                };
                window.addEventListener('mousedown', trigger);
                window.addEventListener('touchstart', trigger, {passive: true});
            }, 500);
        }
    </script>
</body>
</html>
